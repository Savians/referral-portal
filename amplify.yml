# AWS Amplify Build Specification for Next.js
# Monorepo structure: frontend code is in savians-referral-frontend/

version: 1
applications:
  - appRoot: savians-referral-frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --legacy-peer-deps
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
