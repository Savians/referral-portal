# AWS Amplify Build Specification
# This file configures the build process for deploying to Amplify
# Monorepo structure: frontend code is in savians-referral-frontend/

version: 1
applications:
  - appRoot: savians-referral-frontend
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing dependencies..."
            - npm ci
        build:
          commands:
            - echo "Building Next.js application..."
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
